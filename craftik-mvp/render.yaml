# Render Blueprint (https://render.com/docs/blueprint-spec)
# One-shot deploy on Render's free tier for both backend and frontend.
#
# ⚠ Postgres note:
# Render's FREE Postgres expires after 30 days. Rather than lock this file to
# that limit, we assume the database lives OUTSIDE Render (Neon, Supabase,
# Railway…) and is passed in via the DATABASE_URL env var. This gives you a
# permanent free tier for the data. See DEPLOY.md for the recommended flow.
#
# If you want Render-hosted Postgres anyway, uncomment the `databases:` block
# and change `fromDatabase` under the backend to `.connectionString`.

services:
  # ---------- Backend (FastAPI) ----------
  - type: web
    name: craftik-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false           # paste your Neon/Supabase URL in Render dashboard
      - key: SECRET_KEY
        generateValue: true   # Render generates a strong random value
      - key: CORS_ORIGINS
        value: https://craftik-rny0.onrender.com    # update to your actual frontend URL
      - key: ENVIRONMENT
        value: production
      - key: MIGRATE_ON_STARTUP
        value: "true"
      - key: SEED_ON_STARTUP
        value: "true"         # loads demo data on the first empty DB; safe to keep true (idempotent)

  # ---------- Frontend (Next.js standalone) ----------
  - type: web
    name: craftik-web
    runtime: docker
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # NEXT_PUBLIC_* is baked at BUILD time, so we pass it as a build arg.
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://craftik-api.onrender.com/api/v1   # update to your actual backend URL

